name: Laravel CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  laravel-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, bcmath, mysql, intl, openssl, pdo_mysql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader --no-scripts

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Laravel package discover
        run: php artisan package:discover --ansi

      - name: Run Laravel Pint
        run: vendor/bin/pint --test

      - name: Run Larastan
        run: vendor/bin/phpstan analyse --memory-limit=2G

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testdox

      - name: Show summary
        run: echo "✅ Laravel CI/CD completed successfully!"